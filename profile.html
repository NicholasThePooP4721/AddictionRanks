<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AddictionRanks Profil</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>User Profil</h1>
        <p class="subtitle">Jeder User hat eine eigene Profil-Subpage.</p>
        <nav class="nav-links">
          <a href="index.html">Leaderboard</a>
          <a href="forum.html">Forum</a>
          <a href="profile.html" aria-current="page">Mein Profil</a>
        </nav>
      </header>

      <section class="card">
        <h2>Profil anzeigen</h2>
        <p class="hint" id="profile-view-hint"></p>
        <div id="profile-view"></div>
      </section>

      <section class="card">
        <h2>Profil bearbeiten (nur eigenes Profil)</h2>
        <form id="profile-form">
          <label>
            Anzeigename
            <input id="edit-name" maxlength="24" required />
          </label>
          <label>
            Über mich
            <input id="edit-about" maxlength="80" />
          </label>
          <label>
            Profilfoto
            <input id="edit-photo" type="file" accept="image/*" />
          </label>
          <button type="submit">Profil speichern</button>
        </form>
      </section>
    </main>

    <script src="profile.js"></script>
  </body>
</html>
